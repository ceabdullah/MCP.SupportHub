<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Türkiye Itinerary</title>
<style>
  :root {
    --bg: #f6f3ee;
    --card: #ffffff;
    --ink: #26221c;
    --muted: #7a7266;
    --accent: #b3552e;
    --accent-soft: #f3e2d8;
    --line: #e6dfd4;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
  }
  header {
    max-width: 960px;
    margin: 0 auto;
    padding: 56px 24px 16px;
    text-align: center;
  }
  header .kicker {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  header h1 { font-size: clamp(30px, 5vw, 46px); font-weight: 500; }
  header p.sub { color: var(--muted); margin-top: 10px; font-style: italic; }
  .searchbar {
    max-width: 560px;
    margin: 28px auto 8px;
    display: flex;
    gap: 8px;
    padding: 0 24px;
  }
  .searchbar input {
    flex: 1;
    font: inherit;
    padding: 10px 16px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--card);
    color: var(--ink);
    outline: none;
  }
  .searchbar input:focus { border-color: var(--accent); }
  .search-meta {
    text-align: center;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
    margin-bottom: 8px;
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px 80px;
  }
  .day {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 36px;
  }
  .day:nth-child(even) .media { order: 2; }
  .media { position: relative; min-height: 280px; }
  .media img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .media .fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--accent-soft), var(--line));
    color: var(--accent);
    font-size: 48px;
  }
  .body { padding: 32px 36px; display: flex; flex-direction: column; }
  .day-tag {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .body h2 { font-size: 26px; font-weight: 500; margin-bottom: 4px; }
  .body .where {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .body p.summary { font-size: 15.5px; }
  .highlights {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .highlights span {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 12px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 999px;
    padding: 4px 12px;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    font-style: italic;
    padding: 60px 0;
  }
  footer {
    text-align: center;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 12px;
    color: var(--muted);
    padding-bottom: 40px;
  }
  @media (max-width: 720px) {
    .day { grid-template-columns: 1fr; }
    .day:nth-child(even) .media { order: 0; }
    .media { min-height: 200px; }
    .body { padding: 24px; }
  }
</style>
</head>
<body>
<header>
  <div class="kicker">Seven days &middot; Türkiye</div>
  <h1>A Week from Istanbul to the Aegean</h1>
  <p class="sub">Every day of the journey, with a picture and the story of what happens.</p>
</header>

<div class="searchbar">
  <input id="search" type="search" placeholder="Search days — try “balloon”, “ruins”, “Bosphorus”…" autocomplete="off">
</div>
<div class="search-meta" id="searchMeta"></div>

<main id="days"></main>

<footer>Static GitHub Pages build of MCP.Itinerary &middot; full stack (.NET 10, Kafka &rarr; Elasticsearch, Redis) runs via docker compose</footer>

<script>
const daysEl = document.getElementById('days');
const searchEl = document.getElementById('search');
const metaEl = document.getElementById('searchMeta');
let allDays = [];

const fmtDate = iso => new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', {
  weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
});

function render(days) {
  if (!days.length) {
    daysEl.innerHTML = '<div class="empty">No days match that search.</div>';
    return;
  }
  daysEl.innerHTML = days.map(d => `
    <article class="day">
      <div class="media">
        <div class="fallback">✈</div>
        <img src="${d.imageUrl}" alt="${d.title}" loading="lazy"
             onerror="this.remove()">
      </div>
      <div class="body">
        <div class="day-tag">Day ${d.dayNumber} &middot; ${fmtDate(d.date)}</div>
        <h2>${d.title}</h2>
        <div class="where">${d.location}</div>
        <p class="summary">${d.summary}</p>
        <div class="highlights">${(d.highlights || []).map(h => `<span>${h}</span>`).join('')}</div>
      </div>
    </article>`).join('');
}

function search(q) {
  const needle = q.toLowerCase();
  return allDays.filter(d =>
    d.title.toLowerCase().includes(needle) ||
    d.location.toLowerCase().includes(needle) ||
    d.summary.toLowerCase().includes(needle) ||
    (d.highlights || []).some(h => h.toLowerCase().includes(needle)));
}

let timer;
searchEl.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(() => {
    const q = searchEl.value.trim();
    if (!q) { render(allDays); metaEl.textContent = ''; return; }
    const results = search(q);
    render(results);
    metaEl.textContent = `${results.length} result(s)`;
  }, 250);
});

fetch('itinerary.json')
  .then(r => r.json())
  .then(days => { allDays = days.sort((a, b) => a.dayNumber - b.dayNumber); render(allDays); })
  .catch(() => {
    daysEl.innerHTML = '<div class="empty">Could not load the itinerary data.</div>';
  });
</script>
</body>
</html>
